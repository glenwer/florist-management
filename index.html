<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glenview Florist 주문 관리 입력 폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .input-field {
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
            outline: none;
        }

        /* ── 모달 ── */
        #searchModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #searchModal.open {
            display: flex;
        }
        #searchModal .modal-box {
            background: white;
            border-radius: 14px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: modalIn 0.18s ease;
        }
        @keyframes modalIn {
            from { transform: translateY(18px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .modal-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #f3f4f6;
            transition: background 0.15s;
        }
        .modal-item:hover {
            background: #fef2f2;
            border-color: #fecaca;
        }
        .modal-item .name   { font-weight: 700; color: #1f2937; }
        .modal-item .detail { font-size: 0.75rem; color: #6b7280; margin-top: 2px; }

        /* ── 프린트 ── */
        @media print {
            .print-hidden, .message-box { display: none !important; }

            body        { background: white !important; padding: 0 !important; margin: 0 !important; font-size: 10pt; }
            .max-w-4xl  { box-shadow: none !important; max-width: none !important; padding: 4px 6px !important; margin: 0 !important; }

            .input-field {
                border: none !important; padding: 0 0 2px 0 !important;
                background: transparent !important; box-shadow: none !important;
                border-bottom: 1px dashed #aaa !important;
                height: auto !important; min-height: 18px !important;
            }

            .main-header { border-bottom: 2px solid #fecaca !important; padding-bottom: 4px !important; margin-bottom: 8px !important; }
            .main-header h1 { font-size: 18pt !important; font-weight: bolder !important; color: #000 !important; }

            label { font-size: 10pt !important; font-weight: bold !important; color: #4b5563 !important; margin-top: 4px !important; display: block !important; }

            /* 모든 내부 그리드를 block으로 리셋 */
            .grid { display: block !important; }
            .grid > div { margin-bottom: 4px !important; }

            /* ── 메인 2컬럼 레이아웃 ── */
            #mainInfoContainer {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 24px !important;
                margin-bottom: 8px !important;
                page-break-inside: avoid !important;
                align-items: start !important;
            }

            /* 왼쪽(손님) 섹션: 5행 그리드로 고정 */
            #customerInfoSection {
                display: grid !important;
                grid-template-rows: auto auto auto auto auto !important;
                gap: 0 !important;
                margin: 0 !important; padding: 0 !important;
            }
            /* 왼쪽 내부 그리드들도 block으로 */
            #customerInfoSection .grid { display: block !important; }

            /* 손님 전화번호↔주소 순서 교체 */
            #customerInfoSection .grid:first-child {
                display: flex !important; flex-wrap: wrap;
            }
            #customerAddressDiv { order: 2  !important; width: 100% !important; }
            #creditCardDiv      { order: 9  !important; width: 100% !important; }
            #customerPhoneDiv   { order: 10 !important; width: 100% !important; }

            /* 오른쪽(받는사람) 섹션: 5행 그리드로 고정 */
            #recipientInfoSection {
                display: grid !important;
                grid-template-rows: auto auto auto auto auto !important;
                gap: 0 !important;
                margin: 0 !important; padding: 0 !important;
            }
            #recipientInfoSection .grid { display: block !important; }
            #recipientInfoSection .pt-2 { padding-top: 4px !important; }

            /* ── 금액 섹션 ── */
            #amountGrid {
                display: flex !important; flex-wrap: wrap;
                justify-content: space-between; gap: 4px;
            }
            #amountGrid > div         { width: 24% !important; margin-bottom: 0 !important; }
            #amountGrid .input-field  { text-align: left !important; }
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <!-- ══════════════ 검색 결과 모달 ══════════════ -->
    <div id="searchModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-box">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modalTitle" class="text-base font-bold text-gray-800">검색 결과 — 선택하세요</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-xl leading-none">&times;</button>
            </div>
            <p id="modalSubtitle" class="text-xs text-gray-500 mb-3"></p>
            <div id="modalList" class="flex flex-col gap-2 max-h-72 overflow-y-auto"></div>
        </div>
    </div>

    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-xl p-6 sm:p-10">

        <!-- 타이틀 -->
        <div class="flex justify-between items-center mb-6 main-header">
            <h1 class="text-xl sm:text-2xl font-extrabold text-red-600 pb-2">Glenview Florist</h1>
            <div class="flex gap-2 print-hidden">
                <button type="button" id="newButton" onclick="handleNewButton()"
                    class="text-sm px-3 py-1 bg-red-600 text-white rounded-lg shadow transition hover:bg-red-700 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    New
                </button>
                <button type="button" id="updateButton" onclick="handleFindAndUpdateButton()"
                    class="text-sm px-3 py-1 bg-blue-500 text-white rounded-lg shadow transition disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-600 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                    Find &amp; Update
                </button>
            </div>
        </div>

        <!-- 메시지 박스 -->
        <div id="messageBox" class="hidden p-4 text-center fixed top-0 left-0 right-0 z-50 message-box">
            <span id="messageText" class="inline-block p-3 rounded-lg shadow-lg font-semibold text-sm"></span>
        </div>

        <form id="orderForm">

            <div id="mainInfoContainer">

                <!-- 고객 정보 -->
                <div id="customerInfoSection" class="mb-6 pt-2">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label for="customerName" class="block text-sm font-medium text-gray-700 mb-1">
                                손님 이름 * <span class="text-xs text-blue-500 font-normal">(Enter 또는 Find &amp; Update로 검색)</span>
                            </label>
                            <input type="text" id="customerName" name="손님 이름" required class="input-field" autocomplete="off"
                                placeholder="이름 입력 후 Enter">
                        </div>
                        <div>
                            <label for="orderDate" class="block text-sm font-medium text-gray-700 mb-1">주문 일자 *</label>
                            <input type="date" id="orderDate" name="주문 일자" required class="input-field">
                        </div>
                        <div id="customerPhoneDiv">
                            <label for="customerPhone" class="block text-sm font-medium text-gray-700 mb-1">손님 전화번호 *</label>
                            <input type="tel" id="customerPhone" name="손님 전화번호" required class="input-field">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div id="customerAddressDiv">
                            <label for="customerAddress" class="block text-sm font-medium text-gray-700 mb-1">손님 주소</label>
                            <input type="text" id="customerAddress" name="손님 주소" class="input-field">
                        </div>
                        <div id="creditCardDiv">
                            <label for="creditCardNumber" class="block text-sm font-medium text-gray-700 mb-1">크레딧 카드 번호</label>
                            <input type="text" id="creditCardNumber" name="크레딧 카드 번호" class="input-field" maxlength="30">
                        </div>
                    </div>
                </div>

                <!-- 배달 / 수신자 -->
                <div id="recipientInfoSection" class="mb-6 pt-2">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="recipientName" class="block text-sm font-medium text-gray-700 mb-1">받는 사람 이름 *</label>
                            <input type="text" id="recipientName" name="받는 사람 이름" required class="input-field">
                        </div>
                        <div>
                            <label for="deliveryDate" class="block text-sm font-medium text-gray-700 mb-1">배달 일자 *</label>
                            <input type="date" id="deliveryDate" name="배달 일자" required class="input-field">
                        </div>
                        <div>
                            <label for="recipientAddress" class="block text-sm font-medium text-gray-700 mb-1">받는 사람 주소 *</label>
                            <input type="text" id="recipientAddress" name="받는 사람 주소" required class="input-field">
                        </div>
                        <div>
                            <label for="recipientPhone" class="block text-sm font-medium text-gray-700 mb-1">받는 사람 전화번호 *</label>
                            <input type="tel" id="recipientPhone" name="받는 사람 전화번호" required class="input-field">
                        </div>
                    </div>
                    <div class="pt-2">
                        <label for="messageCard" class="block text-sm font-medium text-gray-700 mb-1">메세지 카드 내용</label>
                        <textarea id="messageCard" name="메세지 카드" rows="1" class="input-field"></textarea>
                    </div>
                </div>
            </div>

            <!-- ✅ 프린트 전용 2컬럼 (화면에서는 숨김, JS로 값 복사) -->
            <div id="printInfoContainer" style="display:none;">
                <div class="print-col">
                    <div class="print-row"><label>손님 이름</label><div class="input-field" id="p_customerName"></div></div>
                    <div class="print-row"><label>주문 일자</label><div class="input-field" id="p_orderDate"></div></div>
                    <div class="print-row"><label>손님 주소</label><div class="input-field" id="p_customerAddress"></div></div>
                    <div class="print-row"><label>손님 전화번호</label><div class="input-field" id="p_customerPhone"></div></div>
                    <div class="print-row"><label>크레딧 카드 번호</label><div class="input-field" id="p_creditCard"></div></div>
                </div>
                <div class="print-col">
                    <div class="print-row"><label>받는 사람 이름</label><div class="input-field" id="p_recipientName"></div></div>
                    <div class="print-row"><label>배달 일자</label><div class="input-field" id="p_deliveryDate"></div></div>
                    <div class="print-row"><label>받는 사람 주소</label><div class="input-field" id="p_recipientAddress"></div></div>
                    <div class="print-row"><label>받는 사람 전화번호</label><div class="input-field" id="p_recipientPhone"></div></div>
                    <div class="print-row"><label>메세지 카드 내용</label><div class="input-field" id="p_messageCard"></div></div>
                </div>
            </div>

            <!-- 상품 & 금액 -->
            <div class="mb-6 pt-4">
                <div class="mb-4">
                    <label for="productDetails" class="block text-sm font-medium text-gray-700 mb-1">상품 내용 *</label>
                    <textarea id="productDetails" name="상품 내용" rows="1" required class="input-field"></textarea>
                </div>
                <div id="amountGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    <div>
                        <label for="productAmount" class="block text-sm font-medium text-gray-700 mb-1">상품 금액 *</label>
                        <input type="number" id="productAmount" name="상품 금액" min="0" step="0.01" required class="input-field amount-input text-right" placeholder="0.00">
                    </div>
                    <div>
                        <label for="deliveryFee" class="block text-sm font-medium text-gray-700 mb-1">배달료 *</label>
                        <input type="number" id="deliveryFee" name="배달료" min="0" required class="input-field amount-input text-right" placeholder="0">
                    </div>
                    <div class="print-hidden">
                        <label for="taxRateConfig" class="block text-sm font-medium text-gray-700 mb-1">텍스 비율 (%) *</label>
                        <input type="number" id="taxRateConfig" name="텍스 비율" min="0" step="0.01" required class="input-field amount-input text-right" value="10.75" tabindex="-1">
                    </div>
                    <div>
                        <label for="calculatedTaxDisplay" class="block text-sm font-medium text-gray-700 mb-1">텍스</label>
                        <input type="text" id="calculatedTaxDisplay" class="input-field text-gray-900 text-right font-semibold bg-gray-100" readonly value="0.00">
                    </div>
                    <div>
                        <label for="totalAmountDisplay" class="block text-sm text-red-600 mb-1">총액</label>
                        <input type="text" id="totalAmountDisplay" class="input-field text-red-800 font-bold text-right bg-red-50" readonly value="0.00">
                    </div>
                </div>
                <input type="hidden" id="taxAmountHidden" value="0.00">
                <input type="hidden" id="totalAmountHidden" value="0.00">
                <input type="hidden" id="recordIdentifierHidden" name="searchKey" value="">
            </div>

            <!-- 버튼 -->
            <div class="pt-6 flex flex-col sm:flex-row gap-4 print-hidden">
                <button type="button" onclick="window.print()" class="w-full sm:w-1/4 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-4 rounded-lg shadow transition">
                    🖨️ 프린트
                </button>
                <button type="button" id="deleteButton" onclick="handleDeleteButton()"
                    class="w-full sm:w-1/4 bg-orange-500 hover:bg-orange-600 disabled:opacity-40 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-lg shadow transition">
                    🗑️ 주문 삭제
                </button>
                <button type="submit" id="submitButton" class="w-full sm:w-2/4 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition">
                    주문 등록 및 시트 전송
                </button>
            </div>
        </form>
    </div>

<script>
    const GOOGLE_SHEET_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUJy8ZZKsC8mUc4OoBSTGsWDHTTBViSY_pGxmJ9HYrInGqeeg5cimJh95HACixJmhn/exec';

    // ── 요소 ──────────────────────────────────────────
    const form                    = document.getElementById('orderForm');
    const formFields              = document.querySelectorAll('#orderForm [name]:not([type="hidden"])');
    const customerNameInput       = document.getElementById('customerName');
    const orderDateInput          = document.getElementById('orderDate');
    const deliveryDateInput       = document.getElementById('deliveryDate');
    const productAmountInput      = document.getElementById('productAmount');
    const deliveryFeeInput        = document.getElementById('deliveryFee');
    const taxRateConfigInput      = document.getElementById('taxRateConfig');
    const totalAmountDisplayInput = document.getElementById('totalAmountDisplay');
    const taxAmountHiddenInput    = document.getElementById('taxAmountHidden');
    const totalAmountHiddenInput  = document.getElementById('totalAmountHidden');
    const calculatedTaxDisplayInput = document.getElementById('calculatedTaxDisplay');
    const updateButton            = document.getElementById('updateButton');
    const recordIdentifierHiddenInput = document.getElementById('recordIdentifierHidden');
    const searchModal             = document.getElementById('searchModal');
    const modalList               = document.getElementById('modalList');
    const modalSubtitle           = document.getElementById('modalSubtitle');

    // ── 메시지 박스 ───────────────────────────────────
    let messageTimeout;
    function showMessage(message, styleClass) {
        const messageBox  = document.getElementById('messageBox');
        const messageText = document.getElementById('messageText');
        clearTimeout(messageTimeout);
        messageText.className = 'inline-block p-3 rounded-lg shadow-lg font-semibold text-sm';
        messageBox.classList.remove('hidden');
        messageText.textContent = message;
        if (styleClass) styleClass.split(' ').forEach(c => { if (c.trim()) messageText.classList.add(c.trim()); });
        messageTimeout = setTimeout(() => messageBox.classList.add('hidden'), 5000);
    }

    // ── 전화번호 포맷 ─────────────────────────────────
    function formatPhoneNumber(input) {
        let d = input.value.replace(/\D/g, '').substring(0, 10);
        if      (d.length <= 3) input.value = d;
        else if (d.length <= 6) input.value = d.substring(0,3)+'-'+d.substring(3);
        else                    input.value = d.substring(0,3)+'-'+d.substring(3,6)+'-'+d.substring(6);
    }
    function formatCreditCardNumber(input) {
        if (input.value.length > 30) input.value = input.value.substring(0, 30);
    }

    // ── 금액 계산 ─────────────────────────────────────
    function calculateTotal() {
        const p  = parseFloat(productAmountInput.value) || 0;
        const d  = parseFloat(deliveryFeeInput.value)   || 0;
        const r  = parseFloat(taxRateConfigInput.value) / 100 || 0;
        const M  = 10000;
        const pi = Math.round(p * M);
        const di = Math.round(d * M);
        const ti = Math.round(pi * r);
        const total = pi + di + ti;
        const tax   = (ti   / M).toFixed(2);
        const tot   = (total/ M).toFixed(2);
        calculatedTaxDisplayInput.value = tax;
        totalAmountDisplayInput.value   = tot;
        taxAmountHiddenInput.value      = tax;
        totalAmountHiddenInput.value    = tot;
    }

    // ── 날짜 오늘로 ───────────────────────────────────
    function todayStr() {
        const n = new Date();
        return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    }

    // ── 폼 초기화 (New 버튼 전용) ─────────────────────
    function clearAllFormFields() {
        form.reset();
        orderDateInput.value    = todayStr();
        deliveryDateInput.value = todayStr();
        productAmountInput.value = '0.00';
        deliveryFeeInput.value   = '0';
        calculateTotal();
        recordIdentifierHiddenInput.value = '';
    }

    function handleNewButton() {
        clearAllFormFields();
        customerNameInput.focus();
        showMessage('✨ 새 주문 입력 모드입니다.', 'bg-red-50 text-red-700');
    }

    // ── 모달 ─────────────────────────────────────────
    function openModal(records) {
        modalList.innerHTML = '';
        modalSubtitle.textContent = `${records.length}건 검색됨 — 항목을 선택하면 폼에 채워집니다.`;
        records.forEach(rec => {
            const item = document.createElement('div');
            item.className = 'modal-item';
            item.innerHTML = `
                <div class="name">${rec['손님 이름'] || ''}</div>
                <div class="detail">주문일: ${rec['주문 일자'] || ''} &nbsp;|&nbsp; 전화: ${rec['손님 전화번호'] || ''} &nbsp;|&nbsp; 배달: ${rec['배달 일자'] || ''}</div>`;
            item.addEventListener('click', () => {
                populateForm(rec);
                const key = `${rec['손님 이름']}|||${rec['주문 일자']}`;
                recordIdentifierHiddenInput.value = key;
                showMessage(`✅ '${rec['손님 이름']}'님 기록을 불러왔습니다. 수정 후 "주문 등록" 버튼으로 저장하세요.`, 'bg-green-100 text-green-800');
                closeModal();
            });
            modalList.appendChild(item);
        });
        searchModal.classList.add('open');
    }

    function closeModal() {
        searchModal.classList.remove('open');
    }

    // ESC 키로 모달 닫기
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    // 배경 클릭으로 모달 닫기
    searchModal.addEventListener('click', e => { if (e.target === searchModal) closeModal(); });

    // ── 검색 (부분 이름 포함, 다중 결과 지원) ──────────
    async function searchPreviousOrder() {
        const customerName = customerNameInput.value.trim();
        if (customerName.length < 1) {
            showMessage('⚠️ 손님 이름을 한 글자 이상 입력하세요.', 'bg-yellow-100 text-yellow-800');
            return;
        }

        updateButton.disabled = true;
        updateButton.innerHTML = `<svg class="animate-spin" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Searching...`;

        const url = `${GOOGLE_SHEET_APPS_SCRIPT_URL}?customerName=${encodeURIComponent(customerName)}`;
        showMessage('🔍 검색 중...', 'bg-indigo-100 text-indigo-800');

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();

            if (result.result === 'success') {
                // Apps Script가 단일 객체를 반환하는 경우 — 배열로 감싸기
                const records = Array.isArray(result.data) ? result.data : [result.data];

                // 부분 이름 일치 필터 (first/last name 지원)
                const query = customerName.toLowerCase();
                const matched = records.filter(r => {
                    const full = (r['손님 이름'] || '').toLowerCase();
                    return full.split(/\s+/).some(part => part.startsWith(query)) || full.includes(query);
                });

                if (matched.length === 0) {
                    showMessage(`ℹ️ '${customerName}'와 일치하는 기록이 없습니다.`, 'bg-yellow-100 text-yellow-800');
                    recordIdentifierHiddenInput.value = '';
                } else if (matched.length === 1) {
                    // 단일 결과 → 바로 채우기
                    populateForm(matched[0]);
                    recordIdentifierHiddenInput.value = `${matched[0]['손님 이름']}|||${matched[0]['주문 일자']}`;
                    showMessage(`✅ '${matched[0]['손님 이름']}'님 기록을 불러왔습니다.`, 'bg-green-100 text-green-800');
                } else {
                    // 여러 결과 → 모달
                    openModal(matched);
                }

            } else if (result.result === 'not found') {
                recordIdentifierHiddenInput.value = '';
                showMessage(`ℹ️ '${customerName}'님의 기록을 찾을 수 없습니다. 새 주문을 등록하세요.`, 'bg-yellow-100 text-yellow-800');
            } else {
                showMessage('❌ Apps Script 오류. 로그를 확인하세요.', 'bg-red-100 text-red-800');
            }
        } catch (err) {
            console.error(err);
            showMessage('❌ 검색 실패. Apps Script 배포 설정을 확인하세요.', 'bg-red-100 text-red-800');
        } finally {
            updateButton.disabled = false;
            updateButton.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg> Find &amp; Update`;
        }
    }

    function handleFindAndUpdateButton() { searchPreviousOrder(); }

    // ── 손님 이름 필드: Enter 키 → 검색 ──────────────
    customerNameInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); // 폼 submit 방지
            searchPreviousOrder();
        }
    });

    // ── 폼 채우기 ─────────────────────────────────────
    function populateForm(data) {
        formFields.forEach(field => {
            if (data[field.name] !== undefined) {
                let value = data[field.name];
                if (value && field.type === 'date') value = String(value).split(' ')[0];
                field.value = value;
            }
        });
        if (data['텍스 금액'])  taxAmountHiddenInput.value  = data['텍스 금액'];
        if (data['총액'])       totalAmountHiddenInput.value = data['총액'];
        if (data['텍스 비율'])  taxRateConfigInput.value     = data['텍스 비율'];
        calculateTotal();
    }

    // ── 데이터 전송 ───────────────────────────────────
    async function sendDataToAppsScript(action, submitButton) {
        const isUpdate = action === 'update';
        submitButton.disabled = true;
        submitButton.textContent = isUpdate ? '수정 중...' : '등록 중...';
        calculateTotal();

        const data = {
            action: isUpdate ? 'update' : 'register',
            '텍스 금액': taxAmountHiddenInput.value,
            '총액':      totalAmountHiddenInput.value,
        };
        formFields.forEach(field => { data[field.name] = field.value; });

        if (isUpdate) {
            if (recordIdentifierHiddenInput.value) {
                data['searchKey'] = recordIdentifierHiddenInput.value;
            } else {
                showMessage('⚠️ 수정할 기록이 없습니다. "Find & Update"로 먼저 검색하세요.', 'bg-red-100 text-red-800');
                submitButton.disabled = false;
                submitButton.textContent = '주문 등록 및 시트 전송';
                return;
            }
        }

        showMessage(isUpdate ? '수정 중...' : '등록 중... 잠시만요.', 'bg-blue-100 text-blue-800');

        try {
            await fetch(GOOGLE_SHEET_APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            await new Promise(r => setTimeout(r, 1000));

            // ✅ 저장 후 폼 초기화 하지 않음 — 데이터 그대로 유지
            showMessage(
                isUpdate ? '✅ 시트에서 수정되었습니다.' : '✅ 시트에 등록되었습니다.',
                'bg-green-100 text-green-800'
            );
            // 등록 완료 후 업데이트 식별자만 초기화 (재등록 방지)
            if (!isUpdate) recordIdentifierHiddenInput.value = '';

        } catch (err) {
            console.error(err);
            showMessage(`❌ ${isUpdate ? '수정' : '등록'} 실패. 네트워크 또는 Apps Script 오류.`, 'bg-red-100 text-red-800');
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = '주문 등록 및 시트 전송';
        }
    }

    // ── 삭제 버튼 핸들러 (GET 방식 — 응답 확인 가능) ──
    async function handleDeleteButton() {
        if (!recordIdentifierHiddenInput.value) {
            showMessage('⚠️ 삭제할 기록이 없습니다. 먼저 "Find & Update"로 검색하세요.', 'bg-yellow-100 text-yellow-800');
            return;
        }

        const name = customerNameInput.value.trim() || '이 주문';
        const confirmed = confirm(`"${name}" 주문을 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`);
        if (!confirmed) return;

        const deleteButton = document.getElementById('deleteButton');
        deleteButton.disabled = true;
        deleteButton.textContent = '삭제 중...';
        showMessage('🗑️ 삭제 중...', 'bg-orange-100 text-orange-800');

        try {
            // ✅ GET 방식으로 변경 — 응답을 직접 확인 가능
            const url = `${GOOGLE_SHEET_APPS_SCRIPT_URL}?action=delete&searchKey=${encodeURIComponent(recordIdentifierHiddenInput.value)}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();

            if (result.result === 'success') {
                showMessage('✅ 주문이 삭제되었습니다.', 'bg-green-100 text-green-800');
                clearAllFormFields();
            } else {
                showMessage(`❌ 삭제 실패: ${result.message}`, 'bg-red-100 text-red-800');
            }
        } catch (err) {
            console.error(err);
            showMessage('❌ 삭제 실패. 네트워크 또는 Apps Script 오류.', 'bg-red-100 text-red-800');
        } finally {
            deleteButton.disabled = false;
            deleteButton.textContent = '🗑️ 주문 삭제';
        }
    }


    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const submitButton = form.querySelector('button[type="submit"]');
        const action = recordIdentifierHiddenInput.value ? 'update' : 'register';
        sendDataToAppsScript(action, submitButton);
    });

    // ── 날짜 변경 시 update 식별자 초기화 ────────────
    function resetUpdateIdentifier(fieldName) {
        if (recordIdentifierHiddenInput.value) {
            recordIdentifierHiddenInput.value = '';
            showMessage(`⚠️ ${fieldName} 변경됨 — 업데이트 모드 해제. 재수정하려면 다시 검색하세요.`, 'bg-red-100 text-red-800');
        }
    }
    document.getElementById('orderDate').addEventListener('change',   () => resetUpdateIdentifier('주문 일자'));
    document.getElementById('deliveryDate').addEventListener('change', () => resetUpdateIdentifier('배달 일자'));

    // ── 전화번호 / 카드 포맷 ──────────────────────────
    document.getElementById('customerPhone').addEventListener('input',   e => formatPhoneNumber(e.target));
    document.getElementById('recipientPhone').addEventListener('input',  e => formatPhoneNumber(e.target));
    document.getElementById('creditCardNumber').addEventListener('input', e => formatCreditCardNumber(e.target));

    // ── 금액 계산 이벤트 ──────────────────────────────
    document.querySelectorAll('.amount-input').forEach(input => input.addEventListener('input', calculateTotal));

    // ── 프린트 전 값 동기화 ──────────────────────────────
    window.addEventListener('beforeprint', function() {
        document.getElementById('p_customerName').textContent     = document.getElementById('customerName').value;
        document.getElementById('p_orderDate').textContent        = document.getElementById('orderDate').value;
        document.getElementById('p_customerAddress').textContent  = document.getElementById('customerAddress').value;
        document.getElementById('p_customerPhone').textContent    = document.getElementById('customerPhone').value;
        document.getElementById('p_creditCard').textContent       = document.getElementById('creditCardNumber').value;
        document.getElementById('p_recipientName').textContent    = document.getElementById('recipientName').value;
        document.getElementById('p_deliveryDate').textContent     = document.getElementById('deliveryDate').value;
        document.getElementById('p_recipientAddress').textContent = document.getElementById('recipientAddress').value;
        document.getElementById('p_recipientPhone').textContent   = document.getElementById('recipientPhone').value;
        document.getElementById('p_messageCard').textContent      = document.getElementById('messageCard').value;
    });

    // ── 초기 로드 ─────────────────────────────────────
    window.onload = function() {
        orderDateInput.value    = todayStr();
        deliveryDateInput.value = todayStr();
        productAmountInput.value = '0.00';
        deliveryFeeInput.value   = '0';
        calculateTotal();
    };
</script>
</body>
</html>
