<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 타이틀: Glenview Florist -->
    <title>Glenview Florist 주문 관리 입력 폼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Inter 폰트 적용 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        /* 입력 필드 기본 스타일 */
        .input-field {
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: #ef4444; /* Red focus for floral theme */
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
            outline: none;
        }
        
        /* --- 프린트 전용 스타일: 한 장에 나오도록 최적화 (2열 레이아웃 유지) --- */
        @media print {
            /* 프린트 시 숨겨야 할 요소들 */
            .print-hidden, .message-box { 
                display: none !important;
            }
            /* 본문 배경색 및 여백 제거 */
            body {
                background-color: white !important;
                padding: 0 !important;
                margin: 0 !important; 
                font-size: 10pt;
            }
            .max-w-4xl {
                box-shadow: none !important;
                max-width: none !important; 
                padding: 0 !important;
                margin: 0 !important;
            }
            /* 입력 필드를 텍스트처럼 보이게 하여 깔끔하게 출력 */
            .input-field {
                border: none !important;
                padding: 0 0 2px 0 !important; 
                background-color: transparent !important;
                box-shadow: none !important;
                border-bottom: 1px dashed #aaa !important; 
                height: auto !important;
                min-height: 20px !important; 
            }
            /* 헤더 스타일 조정 */
            .main-header {
                border-bottom: 2px solid #fecaca !important;
                padding-bottom: 4px !important;
                margin-bottom: 10px !important;
            }
            
            /* 메인 타이틀 폰트 20% 크게, 볼드로 설정 */
            .main-header h1 {
                font-size: 18pt !important; /* 약 20% 크게 */
                font-weight: bolder !important; /* 볼드로 설정 */
                color: #000 !important;
            }

            /* '손님 이름'부터 '총액'까지 모든 레이블 폰트 20% 크게, 볼드로 설정 */
            label {
                font-size: 11pt; /* 기존 9pt에서 20% 커진 약 11pt */
                font-weight: bold; /* 볼드로 설정 */
                color: #4b5563 !important;
                margin-top: 5px;
                display: block;
            }
            
            /* 일반 레이아웃의 그리드를 프린트 시에는 블록으로 변경 */
            .grid {
                display: block !important;
            }
            .grid > div {
                margin-bottom: 5px; /* 내부 간격 줄임 */
            }

            /* 손님 정보와 받는 사람 정보를 2열로 나눕니다. */
            #mainInfoContainer {
                display: grid;
                grid-template-columns: 1fr 1fr; /* 두 개의 동일한 열 */
                gap: 20px; 
                margin-bottom: 10px;
                page-break-inside: avoid;
            }
            
            /* 금액 그리드를 수평으로 유지 (텍스 비율 필드 제외, 4열) */
            #amountGrid {
                display: flex !important;
                flex-wrap: wrap;
                justify-content: space-between;
                gap: 5px;
            }
            /* 텍스 비율이 숨겨지므로 나머지 4개 항목에 대해 너비 조정 */
            #amountGrid > div {
                width: 24%; 
                margin-bottom: 0;
            }

            /* --- 상품 금액부터 총액까지 숫자 포지션을 모두 왼쪽으로 변경 (프린트 전용) --- */
            #amountGrid .input-field {
                text-align: left !important;
            }
            /* ---------------------------------------------------------------------------------- */
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-xl p-6 sm:p-10">
        
        <!-- 타이틀 섹션 -->
        <div class="flex justify-between items-center mb-6 main-header">
            <h1 class="text-xl sm:text-2xl font-extrabold text-red-600 pb-2">
                Glenview Florist
            </h1>
            <!-- NEW: 버튼 그룹 -->
            <div class="flex gap-2 print-hidden"> 
                <!-- 새 주문 입력 버튼 -->
                <button type="button" id="newButton" onclick="handleNewButton()"
                    class="text-sm px-3 py-1 bg-red-600 text-white rounded-lg shadow transition hover:bg-red-700 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    New
                </button>
                <!-- 버튼 텍스트를 Find & Update로 변경하고, 검색 함수에 연결 -->
                <button type="button" id="updateButton" onclick="handleFindAndUpdateButton()"
                    class="text-sm px-3 py-1 bg-blue-500 text-white rounded-lg shadow transition disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-600 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                    Find & Update
                </button>
            </div>
        </div>


        <!-- 경고 메시지 섹션 -->
        <div id="messageBox" class="hidden p-4 text-center fixed top-0 left-0 right-0 z-50 message-box">
            <span id="messageText" class="inline-block p-3 rounded-lg shadow-lg font-semibold text-sm"></span>
        </div>

        <form id="orderForm" class=""> 
            
            <!-- NEW: 프린트 시 2열로 나눌 섹션 래퍼 (화면에서는 단일 열로 흐름) -->
            <div id="mainInfoContainer">

                <!-- 고객 정보 섹션 -->
                <div id="customerInfoSection" class="mb-6 pt-2">
                    
                    <!-- Row 1: 손님 이름, 주문 일자, 손님 전화번호 (3열) -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <!-- 손님 이름 -->
                        <div>
                            <label for="customerName" class="block text-sm font-medium text-gray-700 mb-1">손님 이름 * (검색 기준)</label>
                            <input type="text" id="customerName" name="손님 이름" required class="input-field" autocomplete="off">
                        </div>
                        <!-- 주문 일자 -->
                        <div>
                            <label for="orderDate" class="block text-sm font-medium text-gray-700 mb-1">주문 일자 *</label>
                            <input type="date" id="orderDate" name="주문 일자" required class="input-field">
                        </div>
                        <!-- 손님 전화번호 -->
                        <div>
                            <label for="customerPhone" class="block text-sm font-medium text-gray-700 mb-1">손님 전화번호 *</label>
                            <input type="tel" id="customerPhone" name="손님 전화번호" required class="input-field">
                        </div>
                    </div>

                    <!-- Row 2: 손님 주소, 크레딧 카드 번호 (2열) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        
                        <!-- 손님 주소 -->
                        <div>
                            <label for="customerAddress" class="block text-sm font-medium text-gray-700 mb-1">손님 주소</label>
                            <input type="text" id="customerAddress" name="손님 주소" class="input-field">
                        </div>
                        
                        <!-- 크레딧 카드 번호 -->
                        <div>
                            <label for="creditCardNumber" class="block text-sm font-medium text-gray-700 mb-1">크레딧 카드 번호</label>
                            <!-- NOTE: maxlength를 30으로 변경하여 숫자와 기호 모두 입력 가능하도록 함 -->
                            <input type="text" id="creditCardNumber" name="크레딧 카드 번호" class="input-field" maxlength="30">
                        </div>
                    </div>
                </div>

                <!-- 배달 및 수신자 정보 섹션 -->
                <div id="recipientInfoSection" class="mb-6 pt-2">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        
                        <!-- 받는 사람 이름 & 배달 일자 -->
                        <div>
                            <label for="recipientName" class="block text-sm font-medium text-gray-700 mb-1">받는 사람 이름 *</label>
                            <input type="text" id="recipientName" name="받는 사람 이름" required class="input-field">
                        </div>
                        <div>
                            <!-- type="date"로 설정되어 날짜만 입력받습니다. -->
                            <label for="deliveryDate" class="block text-sm font-medium text-gray-700 mb-1">배달 일자 *</label>
                            <input type="date" id="deliveryDate" name="배달 일자" required class="input-field">
                        </div>
                        
                        <!-- 받는 사람 주소 & 전화번호 -->
                        <div>
                            <label for="recipientAddress" class="block text-sm font-medium text-gray-700 mb-1">받는 사람 주소 *</label>
                            <input type="text" id="recipientAddress" name="받는 사람 주소" required class="input-field">
                        </div>
                        <div>
                            <label for="recipientPhone" class="block text-sm font-medium text-gray-700 mb-1">받는 사람 전화번호 *</label>
                            <input type="tel" id="recipientPhone" name="받는 사람 전화번호" required class="input-field">
                        </div>
                    </div>
                    
                    <!-- 메세지 카드 내용 (전체 폭) -->
                    <div class="pt-2">
                        <label for="messageCard" class="block text-sm font-medium text-gray-700 mb-1">메세지 카드 내용</label>
                        <textarea id="messageCard" name="메세지 카드" rows="1" class="input-field"></textarea> 
                    </div>
                </div>
            </div> <!-- END mainInfoContainer -->

            <!-- 상품 및 금액 정보 섹션 (FULL WIDTH BELOW) -->
            <div class="mb-6 pt-4">

                <div class="mb-4">
                    <label for="productDetails" class="block text-sm font-medium text-gray-700 mb-1">상품 내용 *</label>
                    <textarea id="productDetails" name="상품 내용" rows="1" required class="input-field"></textarea> 
                </div>
                
                <!-- 금액 입력 및 계산 필드 (5열 레이아웃) -->
                <div id="amountGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    
                    <!-- 상품 금액 -->
                    <div>
                        <label for="productAmount" class="block text-sm font-medium text-gray-700 mb-1">상품 금액 *</label>
                        <!-- [수정]: step="0.01" 속성을 추가하여 소수점 두 자리 입력 허용 -->
                        <input type="number" id="productAmount" name="상품 금액" min="0" step="0.01" required class="input-field amount-input text-right" placeholder="0.00">
                    </div>
                    <!-- 배달료 -->
                    <div>
                        <label for="deliveryFee" class="block text-sm font-medium text-gray-700 mb-1">배달료 *</label>
                        <input type="number" id="deliveryFee" name="배달료" min="0" required class="input-field amount-input text-right" placeholder="0">
                    </div>
                    <!-- 텍스 비율 (입력 가능) - 인쇄 시 숨김 처리 -->
                    <div class="print-hidden">
                        <label for="taxRateConfig" class="block text-sm font-medium text-gray-700 mb-1">텍스 비율 (%) *</label>
                        <!-- 텍스 금액으로 바로 이동하기 위해 탭 순서에서 제외 -->
                        <input type="number" id="taxRateConfig" name="텍스 비율" min="0" step="0.01" required class="input-field amount-input text-right" value="10.75" tabindex="-1">
                    </div>
                    <!-- 텍스 금액 (자동 계산) -->
                    <div>
                        <label for="calculatedTaxDisplay" class="block text-sm font-medium text-gray-700 mb-1">텍스</label>
                        <!-- name을 비워두고 JavaScript에서 명시적으로 수집하여 전송합니다. -->
                        <input type="text" id="calculatedTaxDisplay" class="input-field text-gray-900 text-right font-semibold bg-gray-100" readonly value="0.00">
                    </div>
                    <!-- 총액 (자동 계산) -->
                    <div>
                        <label for="totalAmount" class="block text-sm text-red-600 mb-1">총액</label>
                        <!-- name을 비워두고 JavaScript에서 명시적으로 수집하여 전송합니다. -->
                        <input type="text" id="totalAmountDisplay" class="input-field text-red-800 font-bold text-right bg-red-50" readonly value="0.00">
                    </div>
                </div>
                
                <!-- 시트 전송을 위해 Hidden 필드 사용 (이 필드들이 실제 데이터 시트에 저장할 값을 가집니다.) -->
                <!-- name을 비우고 ID를 사용해 JS에서 값을 수집합니다. -->
                <input type="hidden" id="taxAmountHidden" name="" value="0.00">
                <input type="hidden" id="totalAmountHidden" name="" value="0.00">
                <!-- 업데이트 시 검색 성공한 레코드를 식별하기 위한 정보 저장 -->
                <input type="hidden" id="recordIdentifierHidden" name="searchKey" value="">
            </div>

            <!-- 버튼 영역 -->
            <div class="pt-6 flex flex-col sm:flex-row gap-4 print-hidden">
                <!-- 프린트 버튼 유지 (별도의 기능) -->
                <button type="button" onclick="window.print()" class="w-full sm:w-1/3 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-4 rounded-lg shadow transition duration-150 ease-in-out">
                    🖨️ 프린트
                </button>
                <!-- 주문 등록 버튼 (기존 기능 유지) -->
                <button type="submit" class="w-full sm:w-2/3 bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg transition duration-150 ease-in-out">
                    주문 등록 및 시트 전송
                </button>
            </div>
        </form>
    </div>

    <script>
        // 여기에 실제 배포된 Apps Script 웹 앱 URL을 붙여넣어야 합니다!
        // URL은 반드시 따옴표로 감싸야 합니다.
        const GOOGLE_SHEET_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztjTGHpnUGrlBBlBL8EEEjT3RCL07t0HAPEEdSnHcGQkvVo1EjxNaf3ZBtsYDkw4O_/exec';
        
        // --- 요소 변수 선언 ---
        const form = document.getElementById('orderForm');
        // 'name' 속성이 있는 모든 입력 필드를 선택합니다.
        const formFields = document.querySelectorAll('#orderForm [name]:not([type="hidden"])');
        
        const customerNameInput = document.getElementById('customerName');
        const orderDateInput = document.getElementById('orderDate');
        const deliveryDateInput = document.getElementById('deliveryDate'); 
        const productAmountInput = document.getElementById('productAmount');
        const deliveryFeeInput = document.getElementById('deliveryFee');
        const taxRateConfigInput = document.getElementById('taxRateConfig');
        const totalAmountDisplayInput = document.getElementById('totalAmountDisplay');
        // Hidden Fields: 이 필드들이 실제 데이터 시트에 저장할 값을 가집니다.
        const taxAmountHiddenInput = document.getElementById('taxAmountHidden');
        const totalAmountHiddenInput = document.getElementById('totalAmountHidden');
        const calculatedTaxDisplayInput = document.getElementById('calculatedTaxDisplay');
        
        // 업데이트 관련 변수
        const updateButton = document.getElementById('updateButton');
        const recordIdentifierHiddenInput = document.getElementById('recordIdentifierHidden');


        // --- 유틸리티 함수: 메시지 박스 표시 ---
        let messageTimeout;
        function showMessage(message, styleClass) {
            const messageBox = document.getElementById('messageBox');
            const messageText = document.getElementById('messageText');
            
            // 기존 스타일 및 타이머 초기화
            clearTimeout(messageTimeout);
            messageText.className = 'inline-block p-3 rounded-lg shadow-lg font-semibold text-sm';
            messageBox.classList.remove('hidden');

            // 새 메시지와 스타일 적용
            messageText.textContent = message;
            
            if (styleClass) {
                styleClass.split(' ').forEach(cls => {
                    if (cls.trim() !== '') {
                        messageText.classList.add(cls.trim());
                    }
                });
            }

            // 5초 후 메시지 숨김
            messageTimeout = setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 5000);
        }

        // --- 전화번호 포맷팅 함수 ---
        function formatPhoneNumber(input) {
            let digits = input.value.replace(/\D/g, '');
            if (digits.length > 10) { digits = digits.substring(0, 10); }
            
            let formatted = '';
            if (digits.length <= 3) {
                formatted = digits;
            } else if (digits.length <= 6) {
                formatted = digits.substring(0, 3) + '-' + digits.substring(3);
            } else { 
                formatted = digits.substring(0, 3) + '-' + digits.substring(3, 6) + '-' + digits.substring(6);
            }
            input.value = formatted;
        }

        /**
         * @desc 크레딧 카드 번호를 최대 30자 길이로만 제한하며, 숫자나 기호를 필터링하지 않습니다.
         */
        function formatCreditCardNumber(input) {
            // 최대 길이 30자로만 제한하고, 입력된 모든 문자(숫자, 기호 등)를 허용합니다.
            let value = input.value;
            if (value.length > 30) {
                input.value = value.substring(0, 30);
            }
        }

        // --- 금액 계산 함수 (텍스와 총액 Hidden 필드를 업데이트함) ---
        function calculateTotal() {
            // 소수점 2자리 계산의 정확성을 위해 parseFloat 대신 정수로 변환하여 계산합니다.
            const productAmountFloat = parseFloat(productAmountInput.value) || 0;
            const deliveryFeeFloat = parseFloat(deliveryFeeInput.value) || 0;
            const taxRate = parseFloat(taxRateConfigInput.value) / 100 || 0;

            const multiplier = 10000; // 10000을 곱하여 소수점 4자리까지 정확도를 높이고 반올림합니다.
            
            // 금액들을 정수로 변환 (소수점 4자리까지 처리)
            const productAmountInt = Math.round(productAmountFloat * multiplier);
            const deliveryFeeInt = Math.round(deliveryFeeFloat * multiplier);
            
            // 텍스 계산
            let taxAmountInt = Math.round(productAmountInt * taxRate); 
            let totalAmountInt = productAmountInt + deliveryFeeInt + taxAmountInt;

            // 다시 소수점 형태로 변환 후, 최종적으로 소수점 2자리에서 반올림
            const taxAmount = (totalAmountInt < 0 ? 0 : taxAmountInt / multiplier).toFixed(2);
            const totalAmount = (totalAmountInt < 0 ? 0 : totalAmountInt / multiplier).toFixed(2);

            // 1. 사용자에게 보여주는 Display 필드 업데이트
            calculatedTaxDisplayInput.value = taxAmount;
            totalAmountDisplayInput.value = totalAmount;
            
            // 2. 데이터 전송을 위한 Hidden 필드 업데이트 (이 값이 시트에 저장됨)
            taxAmountHiddenInput.value = taxAmount;
            totalAmountHiddenInput.value = totalAmount;
        }

        /**
         * @desc 모든 폼 필드를 초기화하고 업데이트 모드를 해제합니다.
         * New 버튼 클릭 시 호출됩니다.
         */
        function clearAllFormFields() {
            // 1. 폼의 모든 입력 필드 초기화
            form.reset();
            
            // 2. 날짜 필드를 현재 날짜로 재설정
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            
            const todayDate = `${year}-${month}-${day}`;

            // 주문 일자와 배달 일자를 오늘 날짜로 설정
            orderDateInput.value = todayDate;
            deliveryDateInput.value = todayDate; 

            // 3. 금액 필드를 0으로 설정하고 계산 재실행 (Hidden 필드 초기화 포함)
            productAmountInput.value = '0.00'; // 소수점 두 자리로 초기화
            deliveryFeeInput.value = '0';
            calculateTotal();

            // 4. 업데이트 모드 해제: Find & Update 버튼은 항상 활성화되어 있어야 합니다.
            recordIdentifierHiddenInput.value = '';
        }
        
        // --- NEW: 새 주문 입력 모드 시작 핸들러 ---
        function handleNewButton() {
            clearAllFormFields();
            customerNameInput.focus();
            showMessage('✨ 새 주문 입력 모드입니다. 필드를 작성하고 "주문 등록" 버튼을 사용하세요.', 'bg-red-50 text-red-700');
        }
        
        // --- Find & Update 버튼 클릭 핸들러 (검색 시작) ---
        function handleFindAndUpdateButton() {
            // 이 버튼은 손님 이름 검색을 시작합니다.
            searchPreviousOrder();
        }

        /**
         * @desc 데이터 전송 함수 (등록/수정 공통). 
         */
        async function sendDataToAppsScript(action, submitButton) {
            if (GOOGLE_SHEET_APPS_SCRIPT_URL.includes('AKfycbwjlaayAJMT2Bd3B0L7Q-H0V9WvCPNcx989P1UENAfqZ3vkMkDf4wlfxQ8Slp9JIx12/exec')) {
                showMessage('❌ 구글 Apps Script URL을 실제 배포 URL로 변경해야 합니다. URL을 확인하세요!', 'bg-yellow-100 text-yellow-800');
                return;
            }

            // 'Find & Update' 버튼을 눌러 검색 성공한 경우에만 'update' 액션이 실행됩니다.
            const isUpdate = action === 'update'; 

            submitButton.disabled = true;
            submitButton.textContent = isUpdate ? '수정 중...' : '등록 중...';
            
            // 최종 계산을 실행하여 Hidden 필드에 최신 텍스와 총액을 반영합니다.
            calculateTotal(); 

            // 데이터 객체 수동 구성 (가장 확실한 방법)
            const data = { 
                action: isUpdate ? 'update' : 'register',
                // Hidden 필드는 name이 없으므로, ID를 통해 값을 가져와서 한글 키로 직접 저장합니다.
                '텍스 금액': taxAmountHiddenInput.value, 
                '총액': totalAmountHiddenInput.value,
            };

            // 'name' 속성이 있는 모든 필드의 값을 수집합니다.
            formFields.forEach(field => {
                data[field.name] = field.value;
            });
            
            // 2. 업데이트 모드 처리
            if (isUpdate) {
                if (recordIdentifierHiddenInput.value) {
                    data['searchKey'] = recordIdentifierHiddenInput.value;
                } else {
                 // 업데이트 버튼을 눌렀는데 식별자가 없으면 오류 처리
                    showMessage('⚠️ 수정할 주문 기록을 찾을 수 없습니다. (먼저 "Find & Update"를 눌러 검색하세요)', 'bg-red-100 text-red-800');
                    submitButton.disabled = false;
                    submitButton.textContent = '주문 등록 및 시트 전송';
                    return;
                }
            }

            showMessage(isUpdate ? '수정 정보를 시트에 전송 중입니다...' : '등록 중... 잠시만 기다려 주세요.', 'bg-blue-100 text-blue-800');

            try {
                // Apps Script 전송 요청 (POST)
                await fetch(GOOGLE_SHEET_APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data) // JSON.stringify를 통해 모든 데이터가 확실히 전송됩니다.
                });

                // no-cors 모드에서는 응답 확인 불가. 1초 대기 후 성공 간주.
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                const successMsg = isUpdate ? 
                    '✅ 주문 정보가 성공적으로 시트에서 수정되었습니다.' : 
                    '✅ 주문 정보가 성공적으로 시트에 등록되었습니다.';
                    
                showMessage(successMsg, 'bg-green-100 text-green-800');
                
                // 성공 시 폼 초기화
                clearAllFormFields(); 
                
            } catch (error) {
                console.error('전송 실패:', error);
                showMessage(`❌ 데이터 ${isUpdate ? '수정' : '등록'}에 실패했습니다. (네트워크 또는 Apps Script 오류)`, 'bg-red-100 text-red-800');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = '주문 등록 및 시트 전송';
            }
        }
        
        // --- 폼 등록 핸들러 (하단 버튼) ---
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitButton = form.querySelector('button[type="submit"]');
            
            // 등록 버튼을 눌렀을 때, recordIdentifierHiddenInput에 값이 있으면 수정 모드로 전환
            const action = recordIdentifierHiddenInput.value ? 'update' : 'register'; 
            
            sendDataToAppsScript(action, submitButton);
        });
        
        // --- 이전 주문 검색 기능 (GET 요청) ---
        async function searchPreviousOrder() {
            const customerName = customerNameInput.value.trim();
            if (customerName.length < 2) {
                showMessage('⚠️ 검색하려면 손님 이름을 두 글자 이상 입력하세요.', 'bg-yellow-100 text-yellow-800');
                return;
            } 

            if (GOOGLE_SHEET_APPS_SCRIPT_URL.includes('AKfycbwjlaayAJMT2Bd3B0L7Q-H0V9WvCPNcx989P1UENAfqZ3vkMkDf4wlfxQ8Slp9JIx12/exec')) {
                showMessage('❌ Apps Script URL을 설정해야 검색 기능을 사용할 수 있습니다.', 'bg-yellow-100 text-yellow-800');
                return;
            }

            // 검색 버튼 비활성화 (검색 중)
            updateButton.disabled = true;
            updateButton.textContent = 'Searching...';

            // Apps Script에 검색 요청을 보냄
            const url = `${GOOGLE_SHEET_APPS_SCRIPT_URL}?customerName=${encodeURIComponent(customerName)}`;
            
            showMessage('🔍 이전 주문 기록을 검색 중입니다...', 'bg-indigo-100 text-indigo-800');

            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                // Apps Script가 동일 이름 중 '가장 최근 업데이트된 단일 레코드'를 반환한다고 가정
                if (result.result === 'success' && result.data) {
                    populateForm(result.data);
                    
                    showMessage(`✅ '${customerName}'님의 최신 주문 기록을 찾았습니다. 폼을 채웠습니다. 하단의 "주문 등록" 버튼을 눌러 수정 내용을 저장하세요.`, 'bg-green-100 text-green-800');
                    
                    // 성공 시: 업데이트 식별자 저장 (손님 이름 + 주문 일자)
                    const searchKey = `${result.data['손님 이름']}|||${result.data['주문 일자']}`; 
                    recordIdentifierHiddenInput.value = searchKey; 
                    
                } else if (result.result === 'not found') {
                    // 검색 실패 시: 현재 입력된 이름은 유지하고 다른 필드는 그대로 둡니다.
                    recordIdentifierHiddenInput.value = '';
                    showMessage(`ℹ️ '${customerName}'님의 이전 주문 기록을 찾을 수 없습니다. 새 주문을 등록하세요.`, 'bg-yellow-100 text-yellow-800');
                } else {
                    showMessage('❌ Apps Script에서 검색 오류가 발생했습니다. 로그를 확인하세요.', 'bg-red-100 text-red-800');
                }
            } catch (error) {
                console.error('검색 요청 실패:', error);
                showMessage('❌ 데이터 검색 요청에 실패했습니다. (Apps Script의 배포 설정을 확인하세요)', 'bg-red-100 text-red-800');
            } finally {
                // 검색 완료 후 버튼 원상 복구
                updateButton.disabled = false;
                updateButton.textContent = 'Find & Update';
            }
        }

        /**
         * @desc 검색된 데이터로 폼을 채웁니다. 날짜 필드 형식을 조정합니다.
         */
        function populateForm(data) {
            // 'name' 속성이 있는 모든 필드를 순회하며 데이터를 채웁니다.
            formFields.forEach(field => {
                if (data[field.name] !== undefined) {
                    let value = data[field.name];
                    
                    if (value) {
                        // 날짜 필드 (type="date") 처리: YYYY-MM-DD 형식만 필요
                        if (field.type === 'date') {
                            // 시트에 시간 부분이 있더라도 제거하고 YYYY-MM-DD 형식만 유지합니다.
                            value = String(value).split(' ')[0]; 
                        } 
                    }
                    
                    field.value = value;
                }
            });
            
            // Hidden 필드에 저장된 텍스와 총액을 수동으로 복구합니다.
            if (data['텍스 금액']) {
                taxAmountHiddenInput.value = data['텍스 금액'];
            }
            if (data['총액']) {
                totalAmountHiddenInput.value = data['총액'];
            }
            if (data['텍스 비율']) {
                taxRateConfigInput.value = data['텍스 비율'];
            }

            // 계산 필드를 모두 채운 후, calculateTotal()을 실행합니다.
            calculateTotal(); 
        }

        // --- 이벤트 리스너 등록 ---
        
        // 금액 및 비율 입력 필드에 이벤트 리스너 추가
        document.querySelectorAll('.amount-input').forEach(input => {
            input.addEventListener('input', calculateTotal);
        });
        
        
        // [추가]: 날짜 변경 시 업데이트 식별자만 초기화
        function resetUpdateIdentifier(fieldName) {
            if (recordIdentifierHiddenInput.value) {
                recordIdentifierHiddenInput.value = '';
                showMessage(`⚠️ ${fieldName}가 변경되어 이전 검색 기록(업데이트 모드)이 초기화되었습니다. 수정하려면 다시 "Find & Update"를 눌러 검색하세요.`, 'bg-red-100 text-red-800');
            }
        }

        document.getElementById('orderDate').addEventListener('change', () => resetUpdateIdentifier('주문 일자'));
        document.getElementById('deliveryDate').addEventListener('change', () => resetUpdateIdentifier('배달 일자'));


        // 전화번호 입력 시 포맷팅 적용
        document.getElementById('customerPhone').addEventListener('input', (e) => formatPhoneNumber(e.target));
        document.getElementById('recipientPhone').addEventListener('input', (e) => formatPhoneNumber(e.target));
        
        // 신용카드 번호 입력 시 포맷팅 적용 (길이만 제한)
        document.getElementById('creditCardNumber').addEventListener('input', (e) => formatCreditCardNumber(e.target));


        // 초기 로드 시 자동 계산 및 현재 날짜 설정
        window.onload = function() {
            calculateTotal();
            clearAllFormFields(); // 초기화 함수를 호출하여 두 날짜 필드 모두 현재 날짜로 채움
            // 초기 로드 시 Find & Update 버튼은 활성화 상태를 유지합니다.
        };
    </script>
</body>
</html>
